<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Bordado</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f1f5f9;}
.wrap{max-width:1200px;width:95%;margin:auto;padding:20px;}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
input,select{padding:10px;border-radius:10px;border:1px solid #ddd;}
.btn{background:#14b8a6;color:#fff;border:none;padding:8px 12px;border-radius:10px;cursor:pointer}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-bottom:20px;}
.kpi-card{background:#fff;border-radius:18px;padding:16px;box-shadow:0 10px 25px rgba(0,0,0,.06);}
.kpi-title{font-size:13px;font-weight:bold;display:flex;gap:8px;align-items:center}
.kpi-item{display:flex;justify-content:space-between;background:#f8fafc;padding:8px;border-radius:10px;margin-bottom:5px;}

/* TABLA */
.table-wrap{background:#fff;border-radius:14px;overflow:auto;max-height:500px;}
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #eee;font-size:12px;}
th{background:#f8fafc;}

.status{padding:4px 8px;border-radius:999px;font-size:11px;color:#fff;}
.entregado{background:#22c55e;}
.enruta{background:#3b82f6;}
.pendiente{background:#facc15;color:#000;}
.recibido{background:#14b8a6;}
.cancelado{background:#ef4444;}

.btn-ver{background:#14b8a6;color:#fff;border:none;padding:6px 12px;border-radius:10px;}
.btn-pdf{background:#ef4444;color:#fff;border:none;padding:6px;border-radius:8px;}

.img-preview{width:40px;height:40px;border-radius:8px;object-fit:cover;cursor:pointer}

/* MODAL */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:none;justify-content:center;align-items:center;}
.modal-content{background:#fff;padding:20px;border-radius:18px;width:95%;max-width:700px;max-height:85vh;overflow:auto;}

.modal-header{display:flex;justify-content:space-between;align-items:center;}
.btn-close{background:#ef4444;color:#fff;border:none;padding:6px 10px;border-radius:8px;cursor:pointer;}

.timeline{margin-top:15px;padding-left:40px;position:relative;}
.timeline::before{content:"";position:absolute;left:15px;top:0;bottom:0;width:3px;background:#14b8a6;}
.timeline-item{display:flex;gap:10px;margin-bottom:10px;}
.timeline-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;}
.ok{background:#22c55e;}
.info{background:#3b82f6;}
.warn{background:#facc15;color:#000;}
.danger{background:#ef4444;}

.cards-container{display:none;flex-direction:column;gap:10px;margin-top:20px;}
.card{background:#fff;padding:12px;border-radius:14px;}

@media(max-width:768px){
.table-wrap{display:none;}
.cards-container{display:flex;}
}
</style>
</head>

<body>

<div class="wrap">

<div class="toolbar">
<input id="buscador" placeholder="Buscar...">
<select id="fEstado">
<option value="">Estado</option>
<option>EN RUTA</option>
<option>PENDIENTE</option>
<option>RECIBIDO</option>
<option>CANCELADO</option>
<option>ENTREGADO</option>
</select>
<button class="btn" onclick="toggleKPI()">KPI</button>
</div>

<!-- KPI -->
<div id="kpiWrapper" class="kpi-grid">
<div class="kpi-card"><div class="kpi-title">Top Clientes</div><div id="topClientes"></div></div>
<div class="kpi-card"><div class="kpi-title">Frecuencia</div><div id="frecuenciaClientes"></div></div>
<div class="kpi-card"><div class="kpi-title">Antigüedad</div><div id="antiguedadClientes"></div></div>
<div class="kpi-card"><canvas id="chart"></canvas></div>
</div>

<!-- TABLA -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>Pedido</th>
<th>Cliente</th>
<th>Status</th>
<th>PDF</th>
<th>Foto</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

<div id="cardsContainer" class="cards-container"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbziDTv6GxSKyvUYDbUltvS1rhv03VKOxFzPwwct90T2Yhg_Eyp7m7kaGX6xxX1zBryw/exec";
let DATA=[],chart;

function fetchData(){
fetch(API)
.then(r=>r.json())
.then(json=>{
DATA=json.map(x=>({
pedido:x.pedido||"",
cliente:x.cliente||"",
status:x.status||"",
pdf:x.pdf||"",
pdfTraslado:x.pdfTraslado||"",
imagen:x.foto||"",
fechaIngreso:x.fechaIngreso||"",
fechaModificacion:x.fechaModificacion||"",
fechaEntrega:x.fechaEntrega||"",
observaciones:x.observaciones||""
})).reverse();
render();
});
}

function render(){
tb.innerHTML=DATA.map(r=>`
<tr>
<td>${r.pedido}</td>
<td>${r.cliente}</td>
<td><span class="status ${cls(r.status)}">${r.status}</span></td>
<td>${r.pdf?`<button class="btn-pdf" onclick="window.open('${r.pdf}')">PDF</button>`:"—"}</td>
<td>${r.imagen?`<img src="${r.imagen}" class="img-preview">`:"—"}</td>
<td><button class="btn-ver" onclick='ver(${JSON.stringify(r)})'>Ver</button></td>
</tr>`).join("");

cardsContainer.innerHTML=DATA.map(r=>`
<div class="card">
<b>#${r.pedido}</b> - ${r.cliente}<br>
<button class="btn-ver" onclick='ver(${JSON.stringify(r)})'>Ver</button>
</div>`).join("");

kpi();
}

function kpi(){
let map={};
DATA.forEach(x=>{map[x.cliente]=(map[x.cliente]||0)+1;});
let arr=Object.entries(map);
topClientes.innerHTML=arr.map(x=>`<div class="kpi-item">${x[0]} ${x[1]}</div>`).join("");
frecuenciaClientes.innerHTML=topClientes.innerHTML;
antiguedadClientes.innerHTML=topClientes.innerHTML;
}

function ver(r){
modal.style.display="flex";
modalContent.innerHTML=`
<div class="modal-header">
<h3>Pedido ${r.pedido}</h3>
<button class="btn-close" onclick="modal.style.display='none'">Cerrar</button>
</div>

<div style="margin-top:10px">
${r.pdf?`<button class="btn-pdf" onclick="window.open('${r.pdf}')">PDF Pedido</button>`:""}
${r.pdfTraslado?`<button class="btn-pdf" onclick="window.open('${r.pdfTraslado}')">PDF TR</button>`:""}
</div>

${r.imagen?`<img src="${r.imagen}" style="width:100%;margin-top:10px;border-radius:10px">`:""}

<div class="timeline">
<div class="timeline-item"><div class="timeline-icon info">i</div><div>${r.fechaIngreso}</div></div>
<div class="timeline-item"><div class="timeline-icon ok">✓</div><div>${r.fechaModificacion}</div></div>
<div class="timeline-item"><div class="timeline-icon warn">!</div><div>${r.fechaEntrega}</div></div>
<div class="timeline-item"><div class="timeline-icon danger">!</div><div>${r.status}</div></div>
</div>
`;
}

function cls(s){
s=(s||"").toLowerCase();
if(s.includes("entregado"))return"entregado";
if(s.includes("ruta"))return"enruta";
return"pendiente";
}

function toggleKPI(){
kpiWrapper.style.display=kpiWrapper.style.display==="none"?"grid":"none";
}

fetchData();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Bordado</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f1f5f9;}
.wrap{max-width:1200px;width:95%;margin:auto;padding:20px;}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
input,select{padding:10px;border-radius:10px;border:1px solid #ddd;}
.btn{background:#14b8a6;color:#fff;border:none;padding:8px 12px;border-radius:10px;cursor:pointer}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-bottom:20px;}
.kpi-card{background:#fff;border-radius:18px;padding:16px;box-shadow:0 10px 25px rgba(0,0,0,.06);}
.kpi-title{font-size:13px;font-weight:bold;display:flex;gap:8px;align-items:center}
.kpi-title i{color:#14b8a6;}
.kpi-list{display:flex;flex-direction:column;gap:8px;}
.kpi-item{display:flex;justify-content:space-between;background:#f8fafc;padding:8px;border-radius:10px;font-size:13px;}
.kpi-item span{color:#14b8a6;font-weight:bold}

/* TABLA */
.table-wrap{background:#fff;border-radius:14px;overflow:auto;max-height:500px;}
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #eee;font-size:12px;}
th{background:#f8fafc;}

.status{padding:4px 8px;border-radius:999px;font-size:11px;color:#fff;font-weight:bold;display:inline-block;}
.entregado{background:#22c55e;}
.enruta{background:#3b82f6;}
.pendiente{background:#facc15;color:#000;}
.recibido{background:#14b8a6;}
.cancelado{background:#ef4444;}
.terminado{background:#8b5cf6;}

.btn-ver{background:linear-gradient(135deg,#14b8a6,#0d9488);color:#fff;border:none;padding:6px 12px;border-radius:10px;cursor:pointer;}
.btn-pdf{background:#ef4444;color:#fff;border:none;padding:6px;border-radius:8px;cursor:pointer;}

.img-preview{width:40px;height:40px;border-radius:8px;object-fit:cover;cursor:pointer}

/* MODAL */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:none;justify-content:center;align-items:center;z-index:9999;}
.modal-content{background:#fff;padding:25px;border-radius:18px;width:95%;max-width:700px;max-height:85vh;overflow-y:auto;}

.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px;}
.btn-close{background:#ef4444;color:#fff;border:none;padding:6px 10px;border-radius:8px;cursor:pointer;}
.modal-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;}

/* TIMELINE */
.timeline{position:relative;margin-top:20px;padding-left:45px;}
.timeline::before{content:"";position:absolute;left:18px;top:0;bottom:0;width:3px;background:#14b8a6;}
.timeline-item{display:flex;gap:15px;margin-bottom:25px;}
.timeline-icon{min-width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;}
.ok{background:#22c55e;}
.info{background:#3b82f6;}
.warn{background:#facc15;color:#000;}
.danger{background:#ef4444;}
.purple{background:#8b5cf6;}
.timeline-content{background:#f8fafc;padding:14px;border-radius:12px;font-size:13px;flex:1;word-break:break-word;}
.timeline-content b{display:block;margin-bottom:6px;}

/* CARDS */
.cards-container{display:none;flex-direction:column;gap:12px;margin-top:20px;}
.card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 8px 20px rgba(0,0,0,.05);}
.card-header{display:flex;justify-content:space-between;font-weight:bold;gap:10px;align-items:center;}
.card-row{display:flex;justify-content:space-between;font-size:13px;margin:4px 0;border-bottom:1px solid #f1f5f9;padding-bottom:4px;gap:10px;}
.card-row span:last-child{text-align:right;word-break:break-word;}
.card-actions{margin-top:10px;}

@media(max-width:768px){
  .table-wrap{display:none;}
  .cards-container{display:flex;}
}

.wrap{
  width:100%;
  max-width:1600px;
  margin:auto;
  padding:20px;
}

@media(min-width:1600px){
  .wrap{max-width:1800px;}
}

@media(min-width:2000px){
  .wrap{max-width:95%;}
}
</style>
</head>

<body>

<div class="wrap">

  <div class="toolbar">
    <input id="buscador" placeholder="Buscar...">
    <select id="fEstado">
      <option value="">Estado</option>
      <option>EN RUTA</option>
      <option>PENDIENTE</option>
      <option>RECIBIDO</option>
      <option>CANCELADO</option>
      <option>ENTREGADO</option>
      <option>TERMINADO</option>
    </select>
    <label>Desde <input type="date" id="fechaDesde"></label>
    <label>Hasta <input type="date" id="fechaHasta"></label>
    <button class="btn" onclick="toggleKPI()">Kpi</button>
  </div>

  <!-- KPI -->
  <div id="kpiWrapper" class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-title"><i class="fa fa-crown"></i> Top Clientes</div>
      <div id="topClientes" class="kpi-list"></div>
    </div>

    <div class="kpi-card">
      <div class="kpi-title"><i class="fa fa-repeat"></i> Frecuencia</div>
      <div id="frecuenciaClientes" class="kpi-list"></div>
    </div>

    <div class="kpi-card">
      <div class="kpi-title"><i class="fa fa-clock"></i> Antigüedad</div>
      <div id="antiguedadClientes" class="kpi-list"></div>
    </div>

    <div class="kpi-card">
      <div class="kpi-title"><i class="fa fa-chart-pie"></i> Estados</div>
      <canvas id="chart"></canvas>
    </div>
  </div>

  <!-- TABLA -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Pedido</th>
          <th>Cliente</th>
          <th>Tipo Doc</th>
          <th>N° Doc</th>
          <th>Status</th>
          <th>Unidades</th>
          <th>Orden de Trabajo</th>
          <th>Documento de Traslado</th>
          <th>Nro de TR</th>
          <th>Foto Opcional</th>
          <th>Leyenda</th>
        </tr>
      </thead>
      <tbody id="tb"></tbody>
    </table>
  </div>

  <!-- CARDS -->
  <div id="cardsContainer" class="cards-container"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyMhSW9JBm6zb90K1V_qHTuSZ9GqR7XNPAgV3j9upGq66OMQNK9RtEii2gT5QXlTpFD/exec";

const ESTADOS_BASE = ["EN RUTA","PENDIENTE","RECIBIDO","CANCELADO","ENTREGADO","TERMINADO"];

let DATA = [];
let LAST_RENDER = [];
let chart = null;

/* DOM */
const tb = document.getElementById("tb");
const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");
const buscador = document.getElementById("buscador");
const fEstado = document.getElementById("fEstado");
const fechaDesde = document.getElementById("fechaDesde");
const fechaHasta = document.getElementById("fechaHasta");
const cardsContainer = document.getElementById("cardsContainer");
const kpiWrapper = document.getElementById("kpiWrapper");
const topClientes = document.getElementById("topClientes");
const frecuenciaClientes = document.getElementById("frecuenciaClientes");
const antiguedadClientes = document.getElementById("antiguedadClientes");

/* HELPERS */
function esc(v){
  return String(v ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function normalizarTexto(v){
  return String(v || "").trim().toUpperCase();
}

function cls(s){
  s = String(s || "").toLowerCase();

  if(s.includes("terminado")) return "terminado";
  if(s.includes("entregado")) return "entregado";
  if(s.includes("ruta")) return "enruta";
  if(s.includes("pendiente")) return "pendiente";
  if(s.includes("recibido")) return "recibido";
  if(s.includes("cancelado")) return "cancelado";

  return "pendiente";
}

function openUrl(url){
  if(url) window.open(url, "_blank");
}

function parseFecha(fechaStr){
  if(!fechaStr) return null;

  const raw = String(fechaStr).trim();

  if(/^\d{4}-\d{2}-\d{2}/.test(raw)){
    const d = new Date(raw + "T00:00:00");
    return isNaN(d) ? null : d;
  }

  if(/^\d{2}\/\d{2}\/\d{4}$/.test(raw)){
    const [dd, mm, yyyy] = raw.split("/");
    const d = new Date(`${yyyy}-${mm}-${dd}T00:00:00`);
    return isNaN(d) ? null : d;
  }

  const d = new Date(raw);
  return isNaN(d) ? null : d;
}

function formatoFechaInput(date){
  if(!date) return "";
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function diasDesde(fechaStr){
  const f = parseFecha(fechaStr);
  if(!f) return null;

  const hoy = new Date();
  hoy.setHours(0,0,0,0);
  f.setHours(0,0,0,0);

  const ms = hoy - f;
  return Math.floor(ms / 86400000);
}

function item(color, titulo, valor, icon){
  return `
    <div class="timeline-item">
      <div class="timeline-icon ${color}"><i class="fa ${icon}"></i></div>
      <div class="timeline-content"><b>${esc(titulo)}</b>${esc(valor || "—")}</div>
    </div>
  `;
}

function colorEstadoTimeline(status){
  const s = normalizarTexto(status);
  if(s === "TERMINADO") return "purple";
  if(s === "ENTREGADO") return "ok";
  if(s === "EN RUTA") return "info";
  if(s === "PENDIENTE") return "warn";
  if(s === "RECIBIDO") return "info";
  if(s === "CANCELADO") return "danger";
  return "warn";
}

/* DATA */
function fetchData(){
  fetch(API)
    .then(r => r.json())
    .then(json => {
      DATA = (Array.isArray(json) ? json : []).map(x => ({
        pedido: x.pedido || "",
        cliente: x.cliente || "",
        tipoDocumento: x.tipoDocumento || "",
        numeroDocumento: x.numeroDocumento || "",
        status: normalizarTexto(x.status || ""),
        etiquetas: x.etiquetas || "",
        pdf: x.pdf || "",
        pdfTraslado: x.pdfTraslado || "",
        TR: x.TR || x.tr || x["Nro TR"] || x["Nro.TR"] || x["nro_tr"] || x.solicitudTraslado || "",
        imagen: x.foto || x.imagen || "",
        fechaIngreso: x.fechaIngreso || "",
        fechaModificacion: x.fechaModificacion || "",
        fechaEntrega: x.fechaEntrega || "",
        observaciones: x.observaciones || ""
      })).reverse();

      render();
    })
    .catch(err => {
      console.error(err);
      alert("Error al cargar datos");
    });
}

function filtrar(){
  const txt = buscador.value.toLowerCase().trim();
  const est = fEstado.value.toLowerCase().trim();
  const desde = fechaDesde.value;
  const hasta = fechaHasta.value;

  return DATA.filter(x => {
    const str = JSON.stringify(x).toLowerCase();
    const okTexto = str.includes(txt) && (!est || x.status.toLowerCase() === est);

    const fecha = parseFecha(x.fechaIngreso);
    let okFecha = true;

    if(desde){
      const fDesde = new Date(desde + "T00:00:00");
      okFecha = fecha ? fecha >= fDesde : false;
    }

    if(hasta){
      const fHasta = new Date(hasta + "T23:59:59");
      okFecha = okFecha && (fecha ? fecha <= fHasta : false);
    }

    return okTexto && okFecha;
  });
}

/* RENDER */
function render(){
  const d = filtrar();
  LAST_RENDER = d;

  tb.innerHTML = d.map((r, i) => `
    <tr>
      <td>${esc(r.pedido)}</td>
      <td>${esc(r.cliente)}</td>
      <td>${esc(r.tipoDocumento)}</td>
      <td>${esc(r.numeroDocumento)}</td>
      <td><span class="status ${cls(r.status)}">${esc(r.status || "—")}</span></td>
      <td>${esc(r.etiquetas || "—")}</td>
      <td>${r.pdf ? `<button class="btn-pdf" onclick='openUrl(${JSON.stringify(r.pdf)})'><i class="fa fa-file-pdf"></i></button>` : "—"}</td>
      <td>${r.pdfTraslado ? `<button class="btn-pdf" onclick='openUrl(${JSON.stringify(r.pdfTraslado)})'><i class="fa fa-file-pdf"></i></button>` : "—"}</td>
      <td>${esc(r.TR || "—")}</td>
      <td>${r.imagen ? `<img src="${esc(r.imagen)}" class="img-preview" onclick='expandImg(${JSON.stringify(r.imagen)})'>` : "—"}</td>
      <td><button class="btn-ver" onclick="verIndex(${i})"><i class="fa fa-eye"></i></button></td>
    </tr>
  `).join("");

  cardsContainer.innerHTML = d.map((r, i) => `
    <div class="card">
      <div class="card-header">
        <span>#${esc(r.pedido)}</span>
        <span class="status ${cls(r.status)}">${esc(r.status || "—")}</span>
      </div>

      <div class="card-row"><b>Cliente:</b><span>${esc(r.cliente)}</span></div>
      <div class="card-row"><b>Documento:</b><span>${esc(r.tipoDocumento)} ${esc(r.numeroDocumento)}</span></div>
      <div class="card-row"><b>Etiquetas:</b><span>${esc(r.etiquetas || "—")}</span></div>
      <div class="card-row"><b>TR:</b><span>${esc(r.TR || "—")}</span></div>

      <div class="card-row">
        <b>PDF:</b>
        <span>${r.pdf ? `<button class="btn-pdf" onclick='openUrl(${JSON.stringify(r.pdf)})'><i class="fa fa-file-pdf"></i></button>` : "—"}</span>
      </div>

      <div class="card-row">
        <b>PDF TR:</b>
        <span>${r.pdfTraslado ? `<button class="btn-pdf" onclick='openUrl(${JSON.stringify(r.pdfTraslado)})'><i class="fa fa-file-pdf"></i></button>` : "—"}</span>
      </div>

      <div class="card-row">
        <b>Foto:</b>
        <span>${r.imagen ? `<img src="${esc(r.imagen)}" class="img-preview" onclick='expandImg(${JSON.stringify(r.imagen)})'>` : "—"}</span>
      </div>

      <div class="card-actions">
        <button class="btn-ver" style="width:100%" onclick="verIndex(${i})">Ver Detalle</button>
      </div>
    </div>
  `).join("");

  kpi(d);
  grafico(d);
}

function verIndex(i){
  const r = LAST_RENDER[i];
  if(r) ver(r);
}

/* KPI */
function kpi(d){
  const mapClientes = {};
  const mapAntiguedad = {};

  d.forEach(x => {
    const c = x.cliente || "Cliente";
    mapClientes[c] = (mapClientes[c] || 0) + 1;

    const dias = diasDesde(x.fechaIngreso);
    if(dias !== null){
      if(mapAntiguedad[c] == null || dias > mapAntiguedad[c]){
        mapAntiguedad[c] = dias;
      }
    }
  });

  const arrClientes = Object.entries(mapClientes).sort((a,b) => b[1] - a[1]);
  const arrAntiguedad = Object.entries(mapAntiguedad).sort((a,b) => b[1] - a[1]);

  topClientes.innerHTML = arrClientes.length
    ? arrClientes.slice(0,5).map(x => `<div class="kpi-item">${esc(x[0])} <span>${x[1]}</span></div>`).join("")
    : `<div class="kpi-item">Sin datos <span>0</span></div>`;

  frecuenciaClientes.innerHTML = arrClientes.length
    ? arrClientes.slice(0,5).map(x => `<div class="kpi-item">${esc(x[0])} <span>${x[1]} pedidos</span></div>`).join("")
    : `<div class="kpi-item">Sin datos <span>0</span></div>`;

  antiguedadClientes.innerHTML = arrAntiguedad.length
    ? arrAntiguedad.slice(0,5).map(x => `<div class="kpi-item">${esc(x[0])} <span>${x[1]} días</span></div>`).join("")
    : `<div class="kpi-item">Sin datos <span>0</span></div>`;
}

/* CHART */
function grafico(d){
  const conteo = {
    "EN RUTA": 0,
    "PENDIENTE": 0,
    "RECIBIDO": 0,
    "CANCELADO": 0,
    "ENTREGADO": 0,
    "TERMINADO": 0
  };

  d.forEach(x => {
    const s = normalizarTexto(x.status);
    if(conteo[s] !== undefined) conteo[s]++;
  });

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "doughnut",
    data: {
      labels: Object.keys(conteo),
      datasets: [{
        data: Object.values(conteo)
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          position: "bottom"
        }
      }
    }
  });
}

/* MODAL */
function ver(r){
  modal.style.display = "flex";
  modalContent.innerHTML = `
    <div class="modal-header">
      <h3>Pedido ${esc(r.pedido)}</h3>
      <button class="btn-close" onclick="cerrarModal()">Cerrar</button>
    </div>

    <div class="modal-actions">
      ${r.pdf ? `<button class="btn-pdf" onclick='openUrl(${JSON.stringify(r.pdf)})'>PDF Pedido</button>` : ""}
      ${r.pdfTraslado ? `<button class="btn-pdf" onclick='openUrl(${JSON.stringify(r.pdfTraslado)})'>PDF Traslado</button>` : ""}
      ${r.imagen ? `<button class="btn" onclick='expandImg(${JSON.stringify(r.imagen)})'>Ver Imagen</button>` : ""}
    </div>

    <div class="timeline">
      ${item("info","Ingreso",r.fechaIngreso,"fa-box")}
      ${item("ok","Modificación",r.fechaModificacion,"fa-edit")}
      ${item("warn","Entrega",r.fechaEntrega,"fa-truck")}
      ${item(colorEstadoTimeline(r.status),"Estado",r.status,"fa-exclamation")}
      ${item("ok","Cliente",r.cliente,"fa-user")}
      ${item("info","Documento",`${r.tipoDocumento} - ${r.numeroDocumento}`,"fa-file")}
      ${item("purple","TR",r.TR,"fa-file-lines")}
      ${item("warn","Observaciones",r.observaciones,"fa-comment")}
    </div>
  `;
}

function expandImg(src){
  modal.style.display = "flex";
  modalContent.innerHTML = `
    <div class="modal-header">
      <h3>Imagen</h3>
      <button class="btn-close" onclick="cerrarModal()">Cerrar</button>
    </div>
    <img src="${esc(src)}" style="width:100%;border-radius:12px;">
  `;
}

function cerrarModal(){
  modal.style.display = "none";
}

/* UI */
function toggleKPI(){
  kpiWrapper.style.display = kpiWrapper.style.display === "none" ? "grid" : "none";
}

modal.onclick = e => {
  if(e.target.id === "modal") cerrarModal();
};

buscador.oninput = render;
fEstado.onchange = render;
fechaDesde.onchange = render;
fechaHasta.onchange = render;

fetchData();
</script>

</body>
</html>

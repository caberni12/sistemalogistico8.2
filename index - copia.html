<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Acceso de Usuario</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:'Segoe UI', Arial, sans-serif;
  background:linear-gradient(135deg,#cdcdce,#33768a);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}
.card{
  background:#fff;
  padding:45px 40px;
  width:380px;
  border-radius:20px;
  box-shadow:0 30px 60px rgba(0,0,0,.25);
  text-align:center;
}

/* LOGO EMPRESA */
.logo-empresa{
  width:120px;
  max-height:120px;
  object-fit:contain;
  margin:0 auto 10px;
  display:none;
}

/* TEXTO CARGA EMPRESA */
.empresa-loading{
  font-size:13px;
  color:#64748b;
  margin-bottom:20px;
}

h3{
  margin:0 0 30px;
  color:#1e293b;
  font-weight:600;
}

.form-group{
  display:flex;
  justify-content:center;
}

input{
  width:100%;
  max-width:300px;
  padding:12px 14px;
  margin-bottom:18px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
  text-align:center;
}

button{
  width:100%;
  max-width:300px;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#3bdaf6;
  color:#fff;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin:0 auto;
}

button:disabled{
  background:#94a3b8;
  cursor:not-allowed;
}

/* LOADER BOTÓN */
.loader{
  width:16px;
  height:16px;
  border:3px solid #fff;
  border-top:3px solid transparent;
  border-radius:50%;
  animation:spin .7s linear infinite;
  display:none;
}
@keyframes spin{ to{ transform:rotate(360deg); } }

.msg{
  margin-top:18px;
  font-size:13px;
  color:#ef4444;
  min-height:18px;
}
</style>
</head>

<body>

<div class="card">

  <!-- Empresa -->
  <img id="logoEmpresa" class="logo-empresa">
  <div id="empresaLoading" class="empresa-loading">Cargando empresa…</div>

  <h3 id="tituloSistema">Acceso de Usuario</h3>

  <div class="form-group">
    <input id="user" placeholder="Usuario">
  </div>

  <div class="form-group">
    <input id="pass" type="password" placeholder="Contraseña">
  </div>

  <button id="btnLogin">
    <span id="btnText">Ingresar</span>
    <div class="loader" id="loader"></div>
  </button>

  <div class="msg" id="mensaje"></div>
</div>

<script>
/* ================= LOGIN ================= */
const API_LOGIN =
"https://script.google.com/macros/s/AKfycbxDUcEzMGw9LWnzn-YUV89So3AFCEnplOHQuGmzq-EV_hnIMhQvgQIPY1AxvlKJPZNx/exec";

const user     = document.getElementById("user");
const pass     = document.getElementById("pass");
const btnLogin = document.getElementById("btnLogin");
const btnText  = document.getElementById("btnText");
const loader   = document.getElementById("loader");
const mensaje  = document.getElementById("mensaje");
const logo     = document.getElementById("logoEmpresa");
const loading  = document.getElementById("empresaLoading");

/* Detectar si empresa se cargó */
function empresaCargada(){
  return logo && logo.src && logo.style.display !== "none";
}

/* Ocultar texto de carga cuando llegue el logo */
const obs = new MutationObserver(()=>{
  if(empresaCargada()){
    loading.style.display = "none";
    obs.disconnect();
  }
});
obs.observe(logo,{ attributes:true });

/* Loader botón */
function activarLoader(){
  btnLogin.disabled = true;
  loader.style.display = "block";
  btnText.textContent = "Validando...";
}
function desactivarLoader(){
  btnLogin.disabled = false;
  loader.style.display = "none";
  btnText.textContent = "Ingresar";
}

/* LOGIN */
btnLogin.addEventListener("click", async ()=>{
  const username = user.value.trim();
  const password = pass.value.trim();
  mensaje.textContent = "";

  if(!username || !password){
    mensaje.textContent = "Debe ingresar usuario y contraseña";
    return;
  }

  activarLoader();

  try{
    const r = await fetch(API_LOGIN,{
      method:"POST",
      headers:{ "Content-Type":"text/plain;charset=UTF-8" },
      body: JSON.stringify({ action:"login", username, password })
    });

    const res = await r.json();
    if(!res.ok){
      mensaje.textContent = res.msg || "Credenciales inválidas";
      desactivarLoader();
      return;
    }

    /* VALIDACIÓN POR ROL */
    if(!empresaCargada() && res.data.rol !== "ADMIN"){
      mensaje.textContent =
        "Empresa aún no cargada. Solo Administrador puede ingresar.";
      desactivarLoader();
      return;
    }

    localStorage.setItem("token", res.token);
    localStorage.setItem("usuario", res.data.user);
    localStorage.setItem("nombre", res.data.nombre);
    localStorage.setItem("rol", res.data.rol);
    localStorage.setItem("permisos", JSON.stringify(res.data.permisos || []));
    localStorage.setItem("login_ok","1");

    window.location.href = "main.html";

  }catch(e){
    mensaje.textContent = "Error de conexión";
    desactivarLoader();
  }
});
</script>

<!-- EMPRESA -->

<script src="app-global.js"></script>
<script src="empresa-header.js"></script>
<script>
if(typeof cargarEmpresaHeader === "function"){
  cargarEmpresaHeader();
}
</script>

<script src="segurity.js"></script>

<script src="sw.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BD-MAESTRA | Sistema de Gestión Servicios AS</title>
<style>
  :root{--bg:#f8fafc;--panel:#fff;--ink:#0f172a;--muted:#64748b;--primary:#2563eb;--teal:#14b8a6;--border:#dbe4ef;--shadow:0 18px 45px rgba(15,23,42,.10);}
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(135deg,#f8fafc,#eef2ff 55%,#ecfeff);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink);font-size:14px;}
  .page{height:100vh;display:flex;flex-direction:column;padding:14px;gap:10px;overflow:hidden;}
  .header{background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow);padding:14px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;}
  h1{margin:0;font-size:1.2rem;letter-spacing:-.02em;}
  .subtitle{color:var(--muted);font-size:.82rem;margin-top:3px;}
  .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
  button{border:none;border-radius:13px;padding:9px 12px;font-weight:850;cursor:pointer;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;}
  .primary{background:linear-gradient(135deg,var(--teal),var(--primary));color:white;box-shadow:0 10px 22px rgba(37,99,235,.18);}
  .secondary{background:white;border:1px solid var(--border);color:var(--ink);}
  button:disabled{opacity:.65;cursor:not-allowed;}
  .filters{background:rgba(255,255,255,.90);border:1px solid var(--border);border-radius:20px;padding:10px;display:grid;grid-template-columns:minmax(220px,1.2fr) 170px 150px 150px auto;gap:8px;align-items:center;}
  input,select{width:100%;border:1px solid #cbd5e1;border-radius:13px;padding:9px 10px;font-size:.9rem;background:white;}
  .table-card{min-height:0;flex:1;background:white;border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;}
  .table-info{padding:10px 12px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:.82rem;}
  .table-wrap{overflow:auto;flex:1;}
  table{width:100%;border-collapse:collapse;min-width:900px;}
  th,td{border-bottom:1px solid #e2e8f0;border-right:1px solid #eef2f7;padding:9px 10px;text-align:left;vertical-align:top;max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  th{position:sticky;top:0;background:#0f172a;color:white;z-index:2;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;}
  tr:hover td{background:#f8fafc;}
  .mini-spinner{width:14px;height:14px;border-radius:999px;border:2px solid rgba(255,255,255,.65);border-top-color:white;animation:spin .75s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:900px){.page{padding:10px}.header{grid-template-columns:1fr}.actions{justify-content:flex-start}.filters{grid-template-columns:1fr 1fr}.filters button{width:100%;justify-content:center}}
  @media(max-width:560px){.filters{grid-template-columns:1fr}body{font-size:13px}}
</style>
</head>
<body>
<div class="page">
  <section class="header">
    <div>
      <h1 id="sheetTitle">BD-MAESTRA</h1>
      <div id="sheetSubtitle" class="subtitle">Actualización automática cada 20 segundos</div>
    </div>
    <div class="actions">
      <button id="btnSync" class="primary">🔄 Sincronizar ahora</button>
      <button id="btnExport" class="secondary">⬇ Exportar XLSX</button>
    </div>
  </section>

  <section class="filters">
    <input id="searchInput" placeholder="Buscar en toda la BD...">
    <select id="statusFilter"><option value="">Todos los status</option></select>
    <input id="fechaDesde" type="date" title="Fecha desde">
    <input id="fechaHasta" type="date" title="Fecha hasta">
    <button id="btnClear" class="secondary">Limpiar filtros</button>
  </section>

  <section class="table-card">
    <div class="table-info">
      <span id="syncInfo">Preparando sincronización...</span>
      <strong id="counter">0 registro(s)</strong>
    </div>
    <div class="table-wrap">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </section>
</div>
<script>window.SHEET_NAME='MAESTRA';window.SHEET_TITLE='BD-MAESTRA';</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="sheet_module.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Logístico Integrado</title>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css">
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<style>
:root{
  --bg:#f1f5f9;
  --card:#ffffff;
  --hover:#f8fafc;
  --text:#0f172a;
  --muted:#64748b;
  --accent:#14b8a6;
  --primary:#3b82f6;
  --danger:#ef4444;
  --border:#e2e8f0;
  --radius:14px;

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);

  --header-height:72px;
}

/* RESET */
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
}

body{
  position:fixed;
  inset:0;
}

.leaflet-div-icon{
  background:none!important;
  border:none!important;
}

/* APP */
.app{
  position:fixed;
  inset:0;
  width:100%;
  height:100vh;
  height:100dvh;
  overflow:hidden;
  background:var(--bg);
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  position:relative;
  z-index:30;
  flex:0 0 auto;
  min-height:var(--header-height);
  background:#fff;
  border-bottom:1px solid var(--border);
  box-shadow:0 4px 14px rgba(0,0,0,.06);
  padding:
    calc(10px + var(--safe-top))
    calc(14px + var(--safe-right))
    10px
    calc(14px + var(--safe-left));
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}

header.hidden{
  display:none;
}

.header-left{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
}

#btnMenu{
  width:42px;
  height:42px;
  font-size:20px;
  background:linear-gradient(135deg,#2dd4bf,#0d9488);
  color:#fff;
  border:none;
  border-radius:12px;
  cursor:pointer;
  flex:0 0 auto;
}

header h1{
  font-size:18px;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.header-info{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:12px;
  color:var(--muted);
  flex-wrap:wrap;
}

header .right{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

/* BUTTONS */
button{
  border:none;
  border-radius:var(--radius);
  padding:10px 16px;
  font-weight:700;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:.2s ease;
}

button:active{
  transform:scale(.98);
}

.btn-primary{
  background:linear-gradient(135deg,#60a5fa,#2563eb);
  color:#fff;
  box-shadow:0 6px 18px rgba(37,99,235,.24);
}

.btn-danger{
  background:linear-gradient(135deg,#f87171,#dc2626);
  color:#fff;
  box-shadow:0 6px 18px rgba(220,38,38,.22);
}

.btn-ghost{
  background:#fff;
  border:1px solid var(--border);
  box-shadow:none;
  color:var(--text);
}

/* MAIN */
.main{
  position:relative;
  flex:1 1 auto;
  min-height:0;
  width:100%;
  overflow:hidden;
}

#mapaBox{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#dbeafe;
}

#mapa{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:1;
}

/* TARJETA MAPA */
#dashboardMapa{
  position:absolute;
  left:16px;
  right:16px;
  bottom:calc(16px + var(--safe-bottom));
  z-index:500;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(8px);
  border:1px solid rgba(226,232,240,.9);
  border-radius:18px;
  box-shadow:0 18px 35px rgba(0,0,0,.18);
  padding:14px 16px;
  transition:all .3s ease;
  overflow:hidden;
  max-width:520px;
}

.map-card-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:8px;
}

.map-card-title{
  font-size:14px;
  font-weight:800;
  color:var(--text);
}

.map-card-header button{
  width:34px;
  height:34px;
  min-width:34px;
  padding:0;
  border-radius:10px;
  border:none;
  font-size:18px;
  font-weight:800;
  cursor:pointer;
  background:linear-gradient(135deg,#60a5fa,#2563eb);
  color:#fff;
  box-shadow:0 4px 10px rgba(0,0,0,.18);
}

#mapCardContent{
  transition:opacity .25s ease, max-height .3s ease;
  max-height:300px;
  opacity:1;
  overflow:hidden;
}

#dashboardMapa.collapsed #mapCardContent{
  max-height:0;
  opacity:0;
  pointer-events:none;
  margin-top:0;
}

.map-stats{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  margin-top:6px;
}

.map-stat{
  background:#f8fafc;
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
}

.map-stat strong{
  display:block;
  font-size:16px;
  color:var(--text);
  margin-bottom:2px;
}

.map-stat span{
  font-size:12px;
  color:var(--muted);
}

/* MENU */
.menu-lateral{
  position:fixed;
  top:0;
  left:-320px;
  width:min(320px, calc(100vw - 24px));
  height:100vh;
  height:100dvh;
  background:#fff;
  box-shadow:6px 0 28px rgba(0,0,0,.18);
  transition:.35s ease;
  z-index:9998;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  padding-top:var(--safe-top);
}

.menu-lateral.open{
  left:0;
}

.menu-header{
  padding:16px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  font-weight:800;
  flex:0 0 auto;
}

.menu-items{
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
  overflow-y:auto;
  flex:1 1 auto;
  padding-bottom:calc(14px + var(--safe-bottom));
}

.menu-item{
  padding:14px;
  border-radius:var(--radius);
  background:var(--hover);
  font-weight:700;
  cursor:pointer;
  border:1px solid transparent;
  transition:.2s ease;
}

.menu-item:hover{
  background:#eef6ff;
  border-color:#cfe0ff;
}

/* OVERLAY */
#menuOverlay{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.28);
  z-index:9997;
  display:none;
}

#menuOverlay.show{
  display:block;
}

/* VIEWER */
.viewer{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  background:#fff;
  z-index:9996;
  display:none;
  flex-direction:column;
}

.viewer.active{
  display:flex;
}

.viewer-header{
  display:none;
  min-height:56px;
  padding:
    calc(8px + var(--safe-top))
    calc(12px + var(--safe-right))
    8px
    calc(12px + var(--safe-left));
  border-bottom:1px solid var(--border);
  background:#fff;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  flex:0 0 auto;
}

.viewer.show-back .viewer-header{
  display:flex;
}

#viewerTitle{
  font-size:15px;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.viewer iframe{
  flex:1 1 auto;
  width:100%;
  height:100%;
  border:none;
  background:#fff;
}

/* LOADER */
#loadingOverlay{
  position:fixed;
  inset:0;
  background:rgba(241,245,249,.92);
  backdrop-filter:blur(4px);
  z-index:10000;
  display:none;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  font-weight:700;
  color:#0f172a;
}

#progressBar{
  position:fixed;
  top:0;
  left:0;
  height:3px;
  width:0%;
  background:linear-gradient(90deg,#3b82f6,#14b8a6);
  z-index:10001;
  display:none;
}

/* MOBILE */
@media (max-width:768px){
  header{
    align-items:flex-start;
  }

  .header-left,
  .header-info,
  header .right{
    width:100%;
  }

  header .right{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  header .right button{
    width:100%;
    min-height:42px;
    padding:10px 12px;
  }

  #dashboardMapa{
    left:10px;
    right:10px;
    bottom:calc(10px + var(--safe-bottom));
    max-width:none;
    padding:12px;
  }

  .map-stats{
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
}

@media (max-width:480px){
  header .right{
    grid-template-columns:1fr;
  }

  #btnMenu{
    width:38px;
    height:38px;
    font-size:18px;
  }

  header h1{
    font-size:16px;
  }

  .map-stats{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<div class="app">

  <div id="loadingOverlay">Iniciando sistema…</div>
  <div id="progressBar"></div>

  <div id="menuOverlay" onclick="toggleMenu(false)"></div>

  <aside id="menuLateral" class="menu-lateral">
    <div class="menu-header">
      <span>📦 Panel de Gestión</span>
      <button type="button" class="btn-ghost" onclick="toggleMenu(false)">✕</button>
    </div>
    <div id="menuModulos" class="menu-items"></div>
  </aside>

  <!-- HEADER SOLO VISTA PRINCIPAL -->
  <header id="mainHeader">
    <div class="header-left">
      <button id="btnMenu" type="button" onclick="toggleMenu()">☰</button>

      <img id="logoEmpresa"
           alt="Logo Empresa"
           style="height:36px;max-width:120px;object-fit:contain;display:none;">

      <h1 id="tituloSistema">Panel Logístico</h1>
    </div>

    <div class="header-info">
      <div id="usuario"></div>
      <div id="conexionInfo"></div>
    </div>

    <div class="right">
      <button type="button" class="btn-primary" onclick="recargarPanel()">⟳ Recargar</button>
      <button type="button" class="btn-danger" onclick="cerrarSesion()">⏻ Cerrar Sesión</button>
    </div>
  </header>

  <main class="main">
    <section id="mapaBox">
      <div id="mapa"></div>

      <div id="dashboardMapa">
        <div class="map-card-header">
          <div class="map-card-title">Resumen del mapa</div>
          <button id="toggleCardBtn" type="button" onclick="toggleMapCard()">－</button>
        </div>

        <div id="mapCardContent">
          <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">
            Visualización general del estado logístico en tiempo real.
          </div>

          <div class="map-stats">
            <div class="map-stat">
              <strong id="statPedidos">0</strong>
              <span>Pedidos activos</span>
            </div>

            <div class="map-stat">
              <strong id="statRuta">0</strong>
              <span>En ruta</span>
            </div>

            <div class="map-stat">
              <strong id="statEntregados">0</strong>
              <span>Entregados</span>
            </div>

            <div class="map-stat">
              <strong id="statMoviles">0</strong>
              <span>Móviles conectados</span>
            </div>
          </div>
        </div>
      </div>

      <!-- VISOR -->
      <div id="viewer" class="viewer">
        <div class="viewer-header">
          <span id="viewerTitle">Módulo</span>
          <button type="button" class="btn-ghost" onclick="volver()">⬅ Volver</button>
        </div>
        <iframe id="frame"></iframe>
      </div>
    </section>
  </main>
</div>

<script>
let mapa;
let vistaActual = 'main.html';

function toggleMapCard(){
  const card = document.getElementById('dashboardMapa');
  const btn  = document.getElementById('toggleCardBtn');
  if(!card || !btn) return;
  const isCollapsed = card.classList.toggle('collapsed');
  btn.textContent = isCollapsed ? '＋' : '－';
}

function toggleMenu(force){
  const menu = document.getElementById('menuLateral');
  const overlay = document.getElementById('menuOverlay');
  if(!menu || !overlay) return;

  const open = typeof force === 'boolean'
    ? force
    : !menu.classList.contains('open');

  menu.classList.toggle('open', open);
  overlay.classList.toggle('show', open);
}

function mostrarVistaPrincipal(){
  const header = document.getElementById('mainHeader');
  const viewer = document.getElementById('viewer');
  const frame = document.getElementById('frame');

  vistaActual = 'main.html';

  if(header) header.classList.remove('hidden');
  if(viewer){
    viewer.classList.remove('active');
    viewer.classList.remove('show-back');
  }
  if(frame) frame.src = '';

  setTimeout(() => {
    if(mapa) mapa.invalidateSize();
  }, 200);
}

function abrirModulo(url, titulo){
  const header = document.getElementById('mainHeader');
  const viewer = document.getElementById('viewer');
  const frame = document.getElementById('frame');
  const title = document.getElementById('viewerTitle');

  vistaActual = url || '';

  if(title) title.textContent = titulo || 'Módulo';
  if(frame) frame.src = url || '';

  if(header) header.classList.add('hidden');

  if(viewer){
    viewer.classList.add('active');
    viewer.classList.add('show-back');
  }

  toggleMenu(false);
}

function volver(){
  mostrarVistaPrincipal();
}

function recargarPanel(){
  if(vistaActual && vistaActual !== 'main.html'){
    const frame = document.getElementById('frame');
    if(frame){
      frame.src = vistaActual;
    }
  }else{
    location.reload();
  }
}

function cerrarSesion(){
  localStorage.removeItem('sessionToken');
  localStorage.removeItem('nombreUsuario');
  window.location.href = 'index.html';
}

document.addEventListener('DOMContentLoaded', () => {
  const usuario = localStorage.getItem('nombreUsuario') || 'Usuario';
  const usuarioBox = document.getElementById('usuario');
  const conexionInfo = document.getElementById('conexionInfo');
  const menuModulos = document.getElementById('menuModulos');

  if(usuarioBox) usuarioBox.textContent = 'Usuario: ' + usuario;
  if(conexionInfo) conexionInfo.textContent = 'Conectado';

  if(document.getElementById('mapa')){
    mapa = L.map('mapa', { zoomControl:true }).setView([-33.4489, -70.6693], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom:19,
      attribution:'&copy; OpenStreetMap'
    }).addTo(mapa);

    setTimeout(() => mapa.invalidateSize(), 300);
  }

  const modulos = [
    { nombre:'Pedidos', archivo:'sistema.html' },
    { nombre:'Repartidores', archivo:'sistema2.html' },
    { nombre:'Dashboard', archivo:'dashboard.html' },
    { nombre:'Clientes', archivo:'clientes.html' },
    { nombre:'Reportes', archivo:'reportes.html' }
  ];

  if(menuModulos){
    menuModulos.innerHTML = '';
    modulos.forEach(mod => {
      const div = document.createElement('div');
      div.className = 'menu-item';
      div.textContent = mod.nombre;
      div.onclick = () => abrirModulo(mod.archivo, mod.nombre);
      menuModulos.appendChild(div);
    });
  }

  mostrarVistaPrincipal();
});

window.addEventListener('resize', () => {
  if(vistaActual === 'main.html' && mapa){
    setTimeout(() => mapa.invalidateSize(), 200);
  }
});
</script>

<script src="app-global.js"></script>
<script src="empresa-header.js"></script>
<script src="auth.js"></script>
<script src="main.js"></script>
<script src="segurity.js"></script>
<script src="navegacion-conduccion.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Logístico Integrado</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

<style>
:root{
  --bg:#f1f5f9;
  --card:#ffffff;
  --hover:#f8fafc;
  --text:#0f172a;
  --muted:#64748b;
  --accent:#14b8a6;
  --primary:#2563eb;
  --danger:#dc2626;
  --border:#e2e8f0;
  --radius:14px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-right:env(safe-area-inset-right,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
}

body{
  position:fixed;
  inset:0;
}

.leaflet-div-icon{
  background:none !important;
  border:none !important;
}

.leaflet-routing-container{
  display:none !important;
}

.app{
  position:fixed;
  inset:0;
  width:100%;
  height:100vh;
  height:100dvh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  background:var(--bg);
}

/* HEADER */
header{
  position:relative;
  z-index:1000;
  background:#fff;
  border-bottom:1px solid var(--border);
  box-shadow:0 4px 14px rgba(0,0,0,.06);
  padding:
    calc(10px + var(--safe-top))
    calc(14px + var(--safe-right))
    10px
    calc(14px + var(--safe-left));
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.header-left{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:12px;
  min-height:42px;
  min-width:0;
}

#btnMenu{
  width:42px;
  height:42px;
  min-width:42px;
  min-height:42px;
  max-width:42px;
  max-height:42px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:linear-gradient(135deg,#2dd4bf,#0d9488);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
  margin:0;
  flex:0 0 42px;
  box-shadow:0 8px 18px rgba(13,148,136,.22);
}

#btnMenu span{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  line-height:1;
  transform:translateY(-1px);
}

#logoEmpresa{
  height:36px;
  max-width:120px;
  object-fit:contain;
  display:none;
  margin:0;
}

#tituloSistema{
  font-size:18px;
  font-weight:800;
  line-height:1.1;
  margin:0;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.header-info{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  font-size:12px;
  color:var(--muted);
}

.right{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button{
  border:none;
  border-radius:12px;
  padding:10px 16px;
  font-weight:700;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:.2s ease;
}

button:active{
  transform:scale(.98);
}

.btn-primary{
  background:linear-gradient(135deg,#60a5fa,#2563eb);
  color:#fff;
  box-shadow:0 6px 18px rgba(37,99,235,.22);
}

.btn-danger{
  background:linear-gradient(135deg,#f87171,#dc2626);
  color:#fff;
  box-shadow:0 6px 18px rgba(220,38,38,.20);
}

.btn-ghost{
  background:#fff;
  color:var(--text);
  border:1px solid var(--border);
}

/* MAIN */
.main{
  position:relative;
  flex:1 1 auto;
  min-height:0;
  overflow:hidden;
}

#mapaBox{
  position:relative;
  width:100%;
  height:100%;
}

#mapa{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:1;
}

/* PANEL */
#dashboardMapa{
  position:absolute;
  left:14px;
  right:14px;
  bottom:calc(14px + var(--safe-bottom));
  z-index:500;
  max-width:620px;
  background:rgba(255,255,255,.97);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:0 18px 35px rgba(0,0,0,.18);
  backdrop-filter:blur(8px);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  max-height:min(78vh, 640px);
}

.map-card-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:14px 14px 8px;
  flex:0 0 auto;
  position:sticky;
  top:0;
  background:rgba(255,255,255,.98);
  z-index:2;
  border-bottom:1px solid rgba(226,232,240,.7);
}

.map-card-title{
  font-size:14px;
  font-weight:800;
}

.map-toggle{
  width:34px;
  height:34px;
  min-width:34px;
  padding:0;
  border-radius:10px;
  color:#fff;
  background:linear-gradient(135deg,#60a5fa,#2563eb);
}

#mapCardScroll{
  overflow-y:auto;
  overflow-x:hidden;
  max-height:min(78vh, 640px);
  -webkit-overflow-scrolling:touch;
}

#mapCardContent{
  padding:10px 14px 14px;
  opacity:1;
}

#dashboardMapa.collapsed #mapCardScroll{
  display:none;
}

#dashboardMapa.collapsed .map-card-header{
  border-bottom:none;
}

#mapCardScroll::-webkit-scrollbar{
  width:8px;
}

#mapCardScroll::-webkit-scrollbar-thumb{
  background:#cbd5e1;
  border-radius:999px;
}

#mapCardScroll::-webkit-scrollbar-track{
  background:transparent;
}

/* BUSCADOR */
.route-search{
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:8px;
  margin-bottom:10px;
}

.route-search input{
  width:100%;
  height:42px;
  border:1px solid var(--border);
  border-radius:12px;
  padding:0 12px;
  background:#fff;
  color:var(--text);
  outline:none;
}

.route-search input:focus{
  border-color:#93c5fd;
  box-shadow:0 0 0 3px rgba(147,197,253,.25);
}

.route-results{
  margin-bottom:10px;
}

.route-results select{
  width:100%;
  height:42px;
  border:1px solid var(--border);
  border-radius:12px;
  padding:0 12px;
  background:#fff;
  color:var(--text);
}

.map-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
  margin-top:8px;
}

.map-stat{
  background:#f8fafc;
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
}

.map-stat strong{
  display:block;
  font-size:14px;
  margin-bottom:4px;
  word-break:break-word;
}

.map-stat span{
  display:block;
  font-size:11px;
  color:var(--muted);
  line-height:1.3;
}

/* MENU */
.menu-lateral{
  position:fixed;
  top:0;
  left:-320px;
  width:min(320px, calc(100vw - 24px));
  height:100vh;
  height:100dvh;
  background:#fff;
  box-shadow:6px 0 28px rgba(0,0,0,.18);
  transition:.35s ease;
  z-index:3000;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  padding-top:var(--safe-top);
}

.menu-lateral.open{
  left:0;
}

.menu-header{
  padding:16px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  font-weight:800;
}

.menu-items{
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
  overflow-y:auto;
  flex:1;
}

.menu-item{
  padding:14px;
  border-radius:12px;
  background:var(--hover);
  font-weight:700;
  cursor:pointer;
  border:1px solid transparent;
  transition:.2s ease;
}

.menu-item:hover{
  background:#eef6ff;
  border-color:#cfe0ff;
}

/* VISOR */
#viewer{
  position:absolute;
  inset:0;
  background:#fff;
  z-index:2000;
  display:none;
}

#viewer.abierto{
  display:block;
}

#frame{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:none;
  background:#fff;
}

/* BOTON VOLVER */
#btnVolverFlotante{
  position:absolute;
  top:calc(12px + var(--safe-top));
  left:calc(12px + var(--safe-left));
  z-index:2001;
  display:none;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:10px 14px;
  border:none;
  border-radius:999px;
  background:linear-gradient(135deg,#0f172a,#334155);
  color:#fff;
  font-weight:700;
  box-shadow:0 10px 25px rgba(0,0,0,.25);
}

#viewer.abierto #btnVolverFlotante{
  display:inline-flex;
}

/* LOADER */
#loadingOverlay{
  position:fixed;
  inset:0;
  z-index:5000;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(241,245,249,.92);
  backdrop-filter:blur(4px);
  font-weight:700;
  color:#0f172a;
}

/* MOBILE */
@media (max-width:768px){
  header{
    padding:
      calc(8px + var(--safe-top))
      calc(10px + var(--safe-right))
      8px
      calc(10px + var(--safe-left));
    gap:8px;
  }

  .header-left,
  .header-info,
  .right{
    width:100%;
  }

  .header-left{
    min-height:38px;
    gap:10px;
  }

  #btnMenu{
    width:38px;
    height:38px;
    min-width:38px;
    min-height:38px;
    max-width:38px;
    max-height:38px;
    border-radius:10px;
    flex:0 0 38px;
  }

  #btnMenu span{
    font-size:20px;
  }

  #logoEmpresa{
    height:30px !important;
    max-width:95px !important;
  }

  #tituloSistema{
    font-size:16px;
    line-height:1.05;
  }

  .header-info{
    font-size:10px;
    gap:6px;
  }

  .right{
    display:grid;
    grid-template-columns:1fr;
    gap:8px;
  }

  .right button{
    width:100%;
    min-height:38px;
    padding:8px 10px;
    font-size:12px;
    border-radius:10px;
  }

  #dashboardMapa{
    left:8px;
    right:8px;
    bottom:calc(8px + var(--safe-bottom));
    max-width:none;
    max-height:min(62vh, 520px);
  }

  .map-card-header{
    padding:10px 10px 6px;
  }

  #mapCardScroll{
    max-height:min(62vh, 520px);
  }

  #mapCardContent{
    padding:8px 10px 10px;
  }

  .route-search{
    grid-template-columns:1fr;
  }

  .map-grid{
    gap:7px;
  }

  .map-stat{
    padding:8px;
  }

  .map-stat strong{
    font-size:12px;
  }

  .map-stat span{
    font-size:10px;
  }

  .menu-lateral{
    width:min(270px, calc(100vw - 18px));
    left:-270px;
  }

  .menu-header{
    padding:12px;
    font-size:14px;
  }

  .menu-items{
    padding:10px;
    gap:8px;
  }

  .menu-item{
    padding:11px 12px;
    font-size:13px;
  }

  #btnVolverFlotante{
    top:calc(10px + var(--safe-top));
    left:calc(10px + var(--safe-left));
    padding:9px 12px;
    font-size:12px;
  }
}
</style>
</head>
<body>

<div class="app">
  <div id="loadingOverlay">Iniciando sistema…</div>

  <aside id="menuLateral" class="menu-lateral">
    <div class="menu-header">
      <span>📦 Panel de Gestión</span>
      <button type="button" class="btn-ghost" onclick="toggleMenu()">✕</button>
    </div>
    <div id="menuModulos" class="menu-items"></div>
  </aside>

  <header id="mainHeader">
    <div class="header-left">
      <button id="btnMenu" type="button" onclick="toggleMenu()" aria-label="Abrir menú">
        <span>☰</span>
      </button>

      <img id="logoEmpresa" alt="Logo Empresa">

      <h1 id="tituloSistema">Panel Logístico</h1>
    </div>

    <div class="header-info">
      <div id="usuario">👤 Usuario</div>
      <div id="conexionInfo">Cargando...</div>
    </div>

    <div class="right">
      <button type="button" class="btn-primary" onclick="recargarPanel()">⟳ Recargar</button>
      <button type="button" class="btn-danger" onclick="cerrarSesion()">⏻ Cerrar Sesión</button>
    </div>
  </header>

  <main class="main">
    <section id="mapaBox">
      <div id="mapa"></div>

      <div id="dashboardMapa">
        <div class="map-card-header">
          <div class="map-card-title">Ruta y ubicación</div>
          <button type="button" class="map-toggle" onclick="toggleMapCard()">－</button>
        </div>

        <div id="mapCardScroll">
          <div id="mapCardContent">
            <div class="route-search">
              <input id="dirSearch" type="text" placeholder="Buscar dirección o destino">
              <button type="button" class="btn-primary" onclick="buscarDireccion()">Buscar</button>
              <button type="button" class="btn-danger" onclick="limpiarRuta()">Limpiar</button>
            </div>

            <div class="route-results">
              <select id="routeResults" onchange="seleccionarResultado(this.value)">
                <option value="">Selecciona un resultado</option>
              </select>
            </div>

            <div class="map-grid">
              <div class="map-stat">
                <strong id="dirTexto">—</strong>
                <span>Ubicación actual</span>
              </div>
              <div class="map-stat">
                <strong id="netTexto">—</strong>
                <span>Estado de red</span>
              </div>
              <div class="map-stat">
                <strong id="speedTexto">🚗 0.0 km/h</strong>
                <span>Velocidad</span>
              </div>
              <div class="map-stat">
                <strong id="routeInfoTexto">Sin ruta activa</strong>
                <span>Destino / navegación</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="viewer">
        <button id="btnVolverFlotante" type="button" onclick="volver()">⬅ Volver</button>
        <iframe id="frame"></iframe>
      </div>
    </section>
  </main>
</div>

<script>
function toggleMapCard(){
  const card = document.getElementById("dashboardMapa");
  const btn = card?.querySelector(".map-toggle");
  if(!card || !btn) return;
  const collapsed = card.classList.toggle("collapsed");
  btn.textContent = collapsed ? "＋" : "－";
}

/***************************************************
CONFIGURACIÓN GENERAL
***************************************************/
const API = "https://script.google.com/macros/s/AKfycbxDUcEzMGw9LWnzn-YUV89So3AFCEnplOHQuGmzq-EV_hnIMhQvgQIPY1AxvlKJPZNx/exec";

let USER_IP = "—";
let WATCH_ID = null;
let LAST_GEOCODE = 0;
let MAPA = null;
let MARCADOR = null;
let CIRCULO = null;

let ROUTE_CONTROL = null;
let DESTINO_MARKER = null;
let RESULTADOS_BUSQUEDA = [];
let LAT_ACTUAL = null;
let LNG_ACTUAL = null;
let REGION_ACTUAL = "";
let PAIS_ACTUAL = "";
let DESTINO_ACTUAL = null;

/***************************************************
🔥 RESTAURACIÓN INMEDIATA DEL MÓDULO
***************************************************/
function restaurarModuloActivo(){
  const data = localStorage.getItem("moduloActivo");
  if(!data) return;
  try{
    const {url, titulo} = JSON.parse(data);
    const viewer = document.getElementById("viewer");
    const frame = document.getElementById("frame");
    if(viewer && frame){
      viewer.style.display = "block";
      viewer.classList.add("abierto");
      frame.src = url;
      if(titulo) document.getElementById("tituloSistema").textContent = titulo;
    }
  }catch{}
}

/***************************************************
ICONOS
***************************************************/
function crearIconoAuto(rot = 0){
  return L.divIcon({
    className: "auto-icon",
    iconSize: [48,48],
    iconAnchor: [24,24],
    html: `<svg viewBox="0 0 64 64" style="transform:rotate(${rot}deg)">
      <rect x="10" y="24" width="44" height="16" rx="6" fill="#111"/>
      <rect x="18" y="20" width="28" height="10" rx="4" fill="#222"/>
      <circle cx="20" cy="42" r="4" fill="#000"/>
      <circle cx="44" cy="42" r="4" fill="#000"/>
    </svg>`
  });
}

const ICONO_ESTATICO = L.divIcon({
  className:"auto-icon",
  iconSize:[32,32],
  iconAnchor:[16,16],
  html:`<svg viewBox="0 0 24 24" fill="#dc2626">
    <path d="M12 2C8 2 4 6 4 10c0 6 8 14 8 14s8-8 8-14c0-4-4-8-8-8z"/>
  </svg>`
});

/***************************************************
MENÚ
***************************************************/
function toggleMenu(){
  document.getElementById("menuLateral")?.classList.toggle("open");
}

/***************************************************
LOADER MÍNIMO
***************************************************/
function iniciarProgreso(){
  const overlay = document.getElementById("loadingOverlay");
  if(overlay) overlay.style.display = "flex";
}

function finalizarProgreso(){
  const overlay = document.getElementById("loadingOverlay");
  if(overlay) overlay.style.display = "none";
}

/***************************************************
INICIO PRINCIPAL
***************************************************/
document.addEventListener("DOMContentLoaded", ()=>{
  iniciarProgreso();
  restaurarModuloActivo();
  setTimeout(obtenerIP,0);
  setTimeout(iniciarReloj,0);
  iniciarSesionRapido();
  iniciarMapa();

  const input = document.getElementById("dirSearch");
  if(input){
    input.addEventListener("keydown", e=>{
      if(e.key === "Enter"){
        e.preventDefault();
        buscarDireccion();
      }
    });
  }
});

async function iniciarSesionRapido(){
  try {
    let user = sessionStorage.getItem("user");
    if(user) user = JSON.parse(user);
    else if(typeof validarSesionGlobal === "function"){
      user = await validarSesionGlobal();
      if(!user) return cerrarSesion();
      sessionStorage.setItem("user", JSON.stringify(user));
    }

    if(user){
      document.getElementById("usuario").textContent = `👤 ${user.nombre} · ${user.rol}`;
    }

    const tareas = [];
    if(typeof cargarEmpresaHeader === "function") tareas.push(cargarEmpresaHeader());
    tareas.push(cargarMenu(user || {rol:"ADMIN", permisos:[]}));
    Promise.all(tareas).catch(console.error);

  } catch(e){ console.error(e); }
  finally { finalizarProgreso(); }
}

/***************************************************
MENÚ DINÁMICO
***************************************************/
async function cargarMenu(user){
  try{
    const r = await fetch(`${API}?action=listarModulos`);
    const res = await r.json();
    const cont = document.getElementById("menuModulos");
    cont.innerHTML = "";
    if(!Array.isArray(res.data)) return;

    res.data.forEach(m=>{
      const [id,nombre,archivo,icono,permiso,activo] = m;
      if(activo !== "SI") return;
      if(user?.rol !== "ADMIN" && user?.permisos && !user.permisos.includes(permiso)) return;

      const item = document.createElement("div");
      item.className = "menu-item";
      item.innerHTML = `${icono || "📦"} ${nombre}`;
      item.onclick = ()=>{
        abrirModulo(archivo,nombre);
        toggleMenu();
      };
      cont.appendChild(item);
    });
  }catch(e){ console.error(e); }
}

/***************************************************
VISOR DE MÓDULOS
***************************************************/
function abrirModulo(url, titulo){
  localStorage.setItem("moduloActivo", JSON.stringify({url,titulo}));
  const viewer = document.getElementById("viewer");
  const frame = document.getElementById("frame");
  if(viewer && frame){
    viewer.style.display = "block";
    viewer.classList.add("abierto");
    frame.src = url;
    if(titulo) document.getElementById("tituloSistema").textContent = titulo;
  }
}

function volver(){
  const viewer = document.getElementById("viewer");
  const frame = document.getElementById("frame");
  if(viewer && frame){
    viewer.style.display = "none";
    viewer.classList.remove("abierto");
    frame.src = "";
    document.getElementById("tituloSistema").textContent = "Panel Logístico";
    localStorage.removeItem("moduloActivo");
  }
  if(MAPA) setTimeout(()=>MAPA.invalidateSize(),300);
}

/***************************************************
MAPA + GPS
***************************************************/
function iniciarMapa(){
  if(!navigator.geolocation || !window.L) return;

  WATCH_ID = navigator.geolocation.watchPosition(async pos=>{
    const {latitude:lat, longitude:lng, speed=0, heading=0} = pos.coords;
    LAT_ACTUAL = lat;
    LNG_ACTUAL = lng;

    if(!MAPA){
      MAPA = L.map("mapa").setView([lat,lng],16);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
        attribution:"&copy; OpenStreetMap"
      }).addTo(MAPA);

      MARCADOR = L.marker([lat,lng],{icon:ICONO_ESTATICO}).addTo(MAPA);
      CIRCULO = L.circle([lat,lng],{
        radius:80,
        color:"#2563eb",
        fillColor:"#60a5fa",
        fillOpacity:.15
      }).addTo(MAPA);
    }

    MARCADOR.setLatLng([lat,lng]);
    MARCADOR.setIcon(speed > 2 ? crearIconoAuto(heading || 0) : ICONO_ESTATICO);

    const conn = navigator.connection || {};
    let r = 80;
    if(conn.effectiveType === "4g") r = 150;
    if(conn.effectiveType === "3g") r = 100;
    if(conn.effectiveType === "2g") r = 60;

    CIRCULO.setLatLng([lat,lng]);
    CIRCULO.setRadius(r);

    actualizarRedVelocidad(speed);

    if(Date.now() - LAST_GEOCODE > 15000){
      LAST_GEOCODE = Date.now();
      await actualizarDireccion(lat,lng);
    }

    if(DESTINO_ACTUAL && ROUTE_CONTROL){
      actualizarRutaOrigen(lat,lng);
    }

  }, ()=>{}, {
    enableHighAccuracy:true,
    maximumAge:2000,
    timeout:10000
  });
}

/***************************************************
DIRECCIÓN ACTUAL + REGIÓN
***************************************************/
async function actualizarDireccion(lat,lng){
  try{
    const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&addressdetails=1&accept-language=es`;
    const r = await fetch(url);
    const d = await r.json();

    document.getElementById("dirTexto").textContent = d.display_name || "—";

    REGION_ACTUAL =
      d.address?.state ||
      d.address?.region ||
      d.address?.county ||
      d.address?.state_district ||
      "";

    PAIS_ACTUAL = d.address?.country_code || "";
  }catch{
    document.getElementById("dirTexto").textContent = "—";
  }
}

/***************************************************
BUSCAR DIRECCIÓN
***************************************************/
async function buscarDireccion(){
  const input = document.getElementById("dirSearch");
  const select = document.getElementById("routeResults");
  const q = (input?.value || "").trim();

  if(!q || !MAPA) return;

  try{
    select.innerHTML = `<option value="">Buscando...</option>`;

    const bounds = MAPA.getBounds();
    const viewbox = [
      bounds.getWest(),
      bounds.getNorth(),
      bounds.getEast(),
      bounds.getSouth()
    ].join(",");

    let params = new URLSearchParams({
      q,
      format:"jsonv2",
      addressdetails:"1",
      limit:"8",
      "accept-language":"es",
      viewbox
    });

    if(PAIS_ACTUAL){
      params.set("countrycodes", PAIS_ACTUAL);
    }

    let r = await fetch(`https://nominatim.openstreetmap.org/search?${params.toString()}`);
    let data = await r.json();

    if((!data || !data.length) && REGION_ACTUAL){
      const q2 = `${q}, ${REGION_ACTUAL}`;
      const params2 = new URLSearchParams({
        q:q2,
        format:"jsonv2",
        addressdetails:"1",
        limit:"8",
        "accept-language":"es"
      });
      if(PAIS_ACTUAL){
        params2.set("countrycodes", PAIS_ACTUAL);
      }
      r = await fetch(`https://nominatim.openstreetmap.org/search?${params2.toString()}`);
      data = await r.json();
    }

    RESULTADOS_BUSQUEDA = Array.isArray(data) ? data : [];
    renderResultadosBusqueda();
  }catch(e){
    console.error(e);
    select.innerHTML = `<option value="">No se pudo buscar</option>`;
  }
}

function renderResultadosBusqueda(){
  const select = document.getElementById("routeResults");
  if(!select) return;

  if(!RESULTADOS_BUSQUEDA.length){
    select.innerHTML = `<option value="">Sin resultados</option>`;
    return;
  }

  select.innerHTML = `<option value="">Selecciona un resultado</option>`;

  RESULTADOS_BUSQUEDA.forEach((item, i)=>{
    const op = document.createElement("option");
    op.value = String(i);
    op.textContent = item.display_name || `Resultado ${i+1}`;
    select.appendChild(op);
  });
}

function seleccionarResultado(index){
  if(index === "") return;
  const item = RESULTADOS_BUSQUEDA[Number(index)];
  if(!item) return;

  const lat = Number(item.lat);
  const lng = Number(item.lon);
  const label = item.display_name || "Destino";

  trazarRuta(lat, lng, label);
}

/***************************************************
RUTA TIPO WAZE
***************************************************/
function trazarRuta(lat, lng, label){
  if(!MAPA || LAT_ACTUAL == null || LNG_ACTUAL == null) return;

  DESTINO_ACTUAL = {lat, lng, label};

  if(DESTINO_MARKER){
    MAPA.removeLayer(DESTINO_MARKER);
  }

  DESTINO_MARKER = L.marker([lat,lng]).addTo(MAPA).bindPopup(label);

  if(ROUTE_CONTROL){
    MAPA.removeControl(ROUTE_CONTROL);
    ROUTE_CONTROL = null;
  }

  ROUTE_CONTROL = L.Routing.control({
    waypoints: [
      L.latLng(LAT_ACTUAL, LNG_ACTUAL),
      L.latLng(lat, lng)
    ],
    routeWhileDragging: false,
    addWaypoints: false,
    draggableWaypoints: false,
    fitSelectedRoutes: true,
    showAlternatives: false,
    lineOptions: {
      styles: [
        {color:"#0ea5e9", opacity:0.95, weight:7}
      ]
    },
    createMarker: function(){
      return null;
    }
  }).addTo(MAPA);

  document.getElementById("routeInfoTexto").textContent = label;
}

function actualizarRutaOrigen(lat, lng){
  if(!ROUTE_CONTROL || !DESTINO_ACTUAL) return;
  try{
    ROUTE_CONTROL.setWaypoints([
      L.latLng(lat, lng),
      L.latLng(DESTINO_ACTUAL.lat, DESTINO_ACTUAL.lng)
    ]);
  }catch{}
}

function limpiarRuta(){
  DESTINO_ACTUAL = null;
  RESULTADOS_BUSQUEDA = [];

  const select = document.getElementById("routeResults");
  if(select){
    select.innerHTML = `<option value="">Selecciona un resultado</option>`;
  }

  const input = document.getElementById("dirSearch");
  if(input) input.value = "";

  if(DESTINO_MARKER){
    MAPA?.removeLayer(DESTINO_MARKER);
    DESTINO_MARKER = null;
  }

  if(ROUTE_CONTROL){
    MAPA?.removeControl(ROUTE_CONTROL);
    ROUTE_CONTROL = null;
  }

  document.getElementById("routeInfoTexto").textContent = "Sin ruta activa";
}

/***************************************************
RED + VELOCIDAD
***************************************************/
function actualizarRedVelocidad(speed){
  const kmh = ((speed || 0) * 3.6).toFixed(1);
  const conn = navigator.connection || {};
  document.getElementById("netTexto").textContent =
    `${navigator.onLine ? "Online" : "Offline"} · ${conn.effectiveType || "—"}`;
  document.getElementById("speedTexto").textContent = `🚗 ${kmh} km/h`;
}

/***************************************************
IP + RELOJ
***************************************************/
async function obtenerIP(){
  try{
    USER_IP = (await (await fetch("https://api.ipify.org?format=json")).json()).ip;
  }catch{}
}

function iniciarReloj(){
  setInterval(()=>{
    const n = new Date();
    const box = document.getElementById("conexionInfo");
    if(box){
      box.innerHTML =
        `📅 ${n.toLocaleDateString("es-CL")}<br>⏰ ${n.toLocaleTimeString("es-CL")}<br>🌐 IP: ${USER_IP}`;
    }
  },1000);
}

/***************************************************
BOTONES
***************************************************/
function recargarPanel(){
  location.reload();
}

function cerrarSesion(){
  if(WATCH_ID) navigator.geolocation.clearWatch(WATCH_ID);
  sessionStorage.clear();
  localStorage.clear();
  location.href = "index.html";
}

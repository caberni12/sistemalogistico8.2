<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Pedidos</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f5f7fb;margin:0;padding:20px;}
.container{max-width:1200px;margin:auto;}

.top{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;}
select,input{padding:8px;border-radius:8px;border:1px solid #ddd;}

.table-wrap{overflow:auto;background:#fff;border-radius:12px;}
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #eee;font-size:13px;}

.status{padding:4px 8px;border-radius:8px;color:#fff;font-size:11px;}
.enruta{background:#3b82f6}
.pendiente{background:#facc15;color:#000}
.recibido{background:#06b6d4}
.cancelado{background:#6b7280}
.entregado{background:#22c55e}

.tag{background:#eee;padding:3px 6px;border-radius:6px;}

.btn-ver{padding:6px 10px;border:none;background:#6366f1;color:#fff;border-radius:8px;cursor:pointer;}

.icon-btn{
display:inline-flex;align-items:center;justify-content:center;
width:38px;height:38px;border-radius:12px;
background:linear-gradient(135deg,#ef4444,#dc2626);
color:#fff;cursor:pointer;transition:.25s;
}

.img-preview{
width:38px;height:38px;object-fit:cover;border-radius:8px;cursor:pointer;
}

.card-list{display:none;gap:10px;}
.card{background:#fff;padding:12px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,.05);}
.card-row{display:flex;justify-content:space-between;font-size:12px;}

.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.5);
display:none;align-items:center;justify-content:center;
}
.modal-content{
background:#fff;padding:20px;border-radius:12px;width:90%;max-width:500px;
}

.timeline{margin-top:15px;}
.timeline-item{display:flex;gap:10px;margin-bottom:10px;}
.timeline-icon{
width:30px;height:30px;border-radius:50%;
display:flex;align-items:center;justify-content:center;color:#fff;
}
.ok{background:#22c55e}
.warn{background:#facc15}
.danger{background:#ef4444}
.info{background:#3b82f6}

@media(max-width:768px){
.table-wrap{display:none}
.card-list{display:flex;flex-direction:column}
}
</style>
</head>

<body>

<div class="container">

<div class="top">
<input id="buscador" placeholder="Buscar...">
<select id="fEstado">
<option value="">Estado</option>
<option>EN RUTA</option>
<option>PENDIENTE</option>
<option>RECIBIDO</option>
<option>CANCELADO</option>
<option>ENTREGADO</option>
</select>
</div>

<canvas id="chart"></canvas>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Pedido</th>
<th>Cliente</th>
<th>Etiqueta</th>
<th>Status</th>
<th>Archivos</th>
<th></th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

<div class="card-list" id="cards"></div>

</div>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

/* ===== TU API ===== */
const API="https://script.google.com/macros/s/AKfycbxVHz5CJ935_IkzTDnWptCRy63E1Wqne-I7Ns683_klkd1924dzp5AgJgGqjsvYSnjHfg/exec";

/* ===== DATA ===== */
let DATA=[];

/* ===== HELPERS ===== */
function cls(s){
if(!s) return "pendiente";
s=s.toLowerCase();
if(s.includes("entregado")) return "entregado";
if(s.includes("en ruta")) return "enruta";
if(s.includes("recibido")) return "recibido";
if(s.includes("cancelado")) return "cancelado";
return "pendiente";
}

function fixImg(url){
if(!url) return "";
if(url.includes("drive.google.com")){
let id=url.match(/[-\w]{25,}/);
if(id) return `https://drive.google.com/uc?export=view&id=${id[0]}`;
}
return url;
}

/* ===== FETCH REAL ===== */
async function cargar(){

try{

let res = await fetch(API);
let data = await res.json();

DATA = data;

render();

}catch(e){
console.error("Error API",e);
}
}

/* ===== FILTRO ===== */
function filtrar(){
let b=buscador.value.toLowerCase();
let e=fEstado.value;

return DATA.filter(x=>{
return (!b || JSON.stringify(x).toLowerCase().includes(b)) &&
(!e || x.status===e);
});
}

/* ===== RENDER ===== */
let tb=document.getElementById("tb");
let cards=document.getElementById("cards");

function render(){

let d=filtrar();

tb.innerHTML="";
cards.innerHTML="";

d.forEach(r=>{

let img=fixImg(r.imagen);

/* TABLA */
tb.innerHTML+=`
<tr>
<td>${r.pedido||""}</td>
<td>${r.cliente||""}</td>
<td><span class="tag">${r.etiquetas||"—"}</span></td>
<td><span class="status ${cls(r.status)}">${r.status||""}</span></td>
<td>

${r.pdfTraslado?`<span class="icon-btn" onclick="window.open('${r.pdfTraslado}')"><i class="fa fa-file-pdf"></i></span>`:""}

${img?`<img src="${img}" class="img-preview" onclick="window.open('${img}')">`:""}

</td>

<td><button class="btn-ver" onclick='ver(${JSON.stringify(r)})'>Ver</button></td>
</tr>`;

/* CARD */
cards.innerHTML+=`
<div class="card">
<h4>Pedido ${r.pedido||""}</h4>

<div class="card-row">
<span>${r.cliente||""}</span>
<span class="status ${cls(r.status)}">${r.status||""}</span>
</div>

<div style="display:flex;gap:6px;margin-top:8px">

${r.pdfTraslado?`<span class="icon-btn" onclick="window.open('${r.pdfTraslado}')"><i class="fa fa-file-pdf"></i></span>`:""}

${img?`<img src="${img}" class="img-preview" onclick="window.open('${img}')">`:""}

<button class="btn-ver" onclick='ver(${JSON.stringify(r)})'>Ver</button>

</div>
</div>`;
});

draw(d);
}

/* ===== MODAL ===== */
let modal=document.getElementById("modal");
let modalContent=document.getElementById("modalContent");

function ver(r){

let img=fixImg(r.imagen);
let estado=cls(r.status);

modal.style.display="flex";

modalContent.innerHTML=`
<h3>Pedido ${r.pedido}</h3>

<b>Cliente:</b> ${r.cliente||""}<br>

<b>Estado:</b> 
<span class="status ${estado}">
${r.status||""}
</span><br><br>

<div style="display:flex;gap:10px">

${r.pdfTraslado?`
<span class="icon-btn" onclick="window.open('${r.pdfTraslado}')">
<i class="fa fa-file-pdf"></i>
</span>`:""}

${img?`
<img src="${img}" class="img-preview" onclick="window.open('${img}')">`:""}

</div>

<div class="timeline">

<div class="timeline-item">
<div class="timeline-icon info"><i class="fa fa-box"></i></div>
<div>Ingreso<br>${r.fechaIngreso||"—"}</div>
</div>

<div class="timeline-item">
<div class="timeline-icon ok"><i class="fa fa-edit"></i></div>
<div>Modificación<br>${r.fechaModificacion||"—"}</div>
</div>

<div class="timeline-item">
<div class="timeline-icon warn"><i class="fa fa-truck"></i></div>
<div>Entrega<br>${r.fechaEntrega||"Pendiente"}</div>
</div>

<div class="timeline-item">
<div class="timeline-icon danger"><i class="fa fa-info"></i></div>
<div>${r.observaciones||""}</div>
</div>

</div>
`;
}

modal.onclick=()=>modal.style.display="none";

/* ===== KPI ===== */
let chart;

function draw(d){

let c={e:0,r:0,p:0,re:0,cancel:0};

d.forEach(x=>{
let s=(x.status||"").toLowerCase();
if(s.includes("entregado")) c.e++;
else if(s.includes("en ruta")) c.r++;
else if(s.includes("recibido")) c.re++;
else if(s.includes("cancelado")) c.cancel++;
else c.p++;
});

if(chart) chart.destroy();

chart=new Chart(document.getElementById("chart"),{
type:"doughnut",
data:{
labels:["Entregado","En Ruta","Pendiente","Recibido","Cancelado"],
datasets:[{data:[c.e,c.r,c.p,c.re,c.cancel]}]
}
});
}

/* EVENTOS */
buscador.oninput=render;
fEstado.onchange=render;

/* INIT REAL */
cargar();

</script>

</body>
</html>

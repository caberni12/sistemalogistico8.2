<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Pedidos</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GENERAL ===== */
body{
font-family:Arial;
background:#f5f7fb;
margin:0;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

/* ===== FILTROS ===== */
.top{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

select,input{
padding:8px;
border-radius:8px;
border:1px solid #ddd;
}

/* ===== TABLA ===== */
.table-wrap{
overflow:auto;
background:#fff;
border-radius:12px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
font-size:13px;
}

/* ===== STATUS ===== */
.status{
padding:4px 8px;
border-radius:8px;
color:#fff;
font-size:11px;
}

.enruta{background:#3b82f6}
.pendiente{background:#facc15;color:#000}
.recibido{background:#06b6d4}
.cancelado{background:#6b7280}
.entregado{background:#22c55e}

/* ===== TAG ===== */
.tag{
background:#eee;
padding:3px 6px;
border-radius:6px;
}

/* ===== BOTONES ===== */
.btn-ver{
padding:6px 10px;
border:none;
background:#6366f1;
color:#fff;
border-radius:8px;
cursor:pointer;
}

/* ===== ICONOS ===== */
.icon-btn{
display:inline-flex;
align-items:center;
justify-content:center;
width:34px;
height:34px;
border-radius:10px;
background:#ef4444;
color:#fff;
cursor:pointer;
}

.img-preview{
width:34px;
height:34px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
}

/* ===== CARDS MOBILE ===== */
.card-list{
display:none;
gap:10px;
}

.card{
background:#fff;
padding:12px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,.05);
}

.card-row{
display:flex;
justify-content:space-between;
font-size:12px;
}

/* ===== MODAL ===== */
.modal{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#fff;
padding:20px;
border-radius:12px;
width:90%;
max-width:500px;
}

/* ===== TIMELINE ===== */
.timeline{
margin-top:15px;
}

.timeline-item{
display:flex;
gap:10px;
margin-bottom:10px;
}

.timeline-icon{
width:30px;
height:30px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
}

.ok{background:#22c55e}
.warn{background:#facc15}
.danger{background:#ef4444}
.info{background:#3b82f6}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
.table-wrap{display:none}
.card-list{display:flex;flex-direction:column}
}

</style>
</head>

<body>

<div class="container">

<!-- FILTROS -->
<div class="top">
<input id="buscador" placeholder="Buscar...">
<select id="fEstado">
<option value="">Estado</option>
<option>EN RUTA</option>
<option>PENDIENTE</option>
<option>RECIBIDO</option>
<option>CANCELADO</option>
<option>ENTREGADO</option>
</select>
</div>

<!-- KPI -->
<canvas id="chart"></canvas>

<!-- TABLA -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>Pedido</th>
<th>Cliente</th>
<th>Etiqueta</th>
<th>Status</th>
<th>Archivos</th>
<th></th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

<!-- CARDS -->
<div class="card-list" id="cards"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

/* ===== DATA DEMO ===== */
let DATA=[
{
pedido:"1001",
cliente:"Juan",
status:"EN RUTA",
imagen:"",
pdfTraslado:"",
fechaIngreso:"2026-03-01",
fechaModificacion:"2026-03-02",
fechaEntrega:"",
observaciones:"En camino"
}
];

/* ===== HELPERS ===== */
function cls(s){
if(!s) return "pendiente";
s=s.toLowerCase();
if(s.includes("entregado")) return "entregado";
if(s.includes("en ruta")) return "enruta";
if(s.includes("recibido")) return "recibido";
if(s.includes("cancelado")) return "cancelado";
return "pendiente";
}

function fixImg(url){
if(!url) return "";
if(url.includes("drive.google.com")){
let id=url.match(/[-\w]{25,}/);
if(id) return `https://drive.google.com/uc?export=view&id=${id[0]}`;
}
return url;
}

/* ===== FILTRO ===== */
function filtrar(){
let b=buscador.value.toLowerCase();
let e=fEstado.value;

return DATA.filter(x=>{
return (!b || JSON.stringify(x).toLowerCase().includes(b)) &&
(!e || x.status===e);
});
}

/* ===== RENDER ===== */
let tb=document.getElementById("tb");
let cards=document.getElementById("cards");

function render(){

let d=filtrar();

tb.innerHTML="";
cards.innerHTML="";

d.forEach(r=>{

let img=fixImg(r.imagen);

/* TABLA */
tb.innerHTML+=`
<tr>
<td>${r.pedido}</td>
<td>${r.cliente}</td>
<td><span class="tag">${r.etiquetas||"—"}</span></td>
<td><span class="status ${cls(r.status)}">${r.status}</span></td>
<td>

${r.pdfTraslado?`<span class="icon-btn" onclick="window.open('${r.pdfTraslado}')"><i class="fa fa-file-pdf"></i></span>`:""}

${img?`<img src="${img}" class="img-preview" onclick="window.open('${img}')">`:""}

</td>

<td><button class="btn-ver" onclick='ver(${JSON.stringify(r)})'>Ver</button></td>

</tr>`;

/* CARD */
cards.innerHTML+=`
<div class="card">
<h4>Pedido ${r.pedido}</h4>

<div class="card-row">
<span>${r.cliente}</span>
<span class="status ${cls(r.status)}">${r.status}</span>
</div>

<div class="card-row">
<span>${r.observaciones||""}</span>
</div>

<div style="display:flex;gap:6px;margin-top:8px">

${r.pdfTraslado?`<span class="icon-btn" onclick="window.open('${r.pdfTraslado}')"><i class="fa fa-file-pdf"></i></span>`:""}

${img?`<img src="${img}" class="img-preview" onclick="window.open('${img}')">`:""}

<button class="btn-ver" onclick='ver(${JSON.stringify(r)})'>Ver</button>

</div>
</div>`;
});

draw(d);
}

/* ===== MODAL ===== */
let modal=document.getElementById("modal");
let modalContent=document.getElementById("modalContent");

function ver(r){

let img=fixImg(r.imagen);

modal.style.display="flex";

modalContent.innerHTML=`
<h3>Pedido ${r.pedido}</h3>

<b>Cliente:</b> ${r.cliente}<br>
<b>Estado:</b> ${r.status}<br>

${r.pdfTraslado?`<span class="icon-btn" onclick="window.open('${r.pdfTraslado}')"><i class="fa fa-file-pdf"></i></span>`:""}

${img?`<img src="${img}" style="width:100%;margin-top:10px;border-radius:10px">`:""}

<div class="timeline">

<div class="timeline-item">
<div class="timeline-icon info"><i class="fa fa-box"></i></div>
<div>Ingreso<br>${r.fechaIngreso}</div>
</div>

<div class="timeline-item">
<div class="timeline-icon ok"><i class="fa fa-edit"></i></div>
<div>Modificación<br>${r.fechaModificacion}</div>
</div>

<div class="timeline-item">
<div class="timeline-icon warn"><i class="fa fa-truck"></i></div>
<div>Entrega<br>${r.fechaEntrega||"Pendiente"}</div>
</div>

<div class="timeline-item">
<div class="timeline-icon danger"><i class="fa fa-info"></i></div>
<div>${r.observaciones||""}</div>
</div>

</div>
`;
}

modal.onclick=()=>modal.style.display="none";

/* ===== KPI ===== */
let chart;

function draw(d){

let c={e:0,r:0,p:0,re:0,cancel:0};

d.forEach(x=>{
let s=x.status.toLowerCase();
if(s.includes("entregado")) c.e++;
else if(s.includes("en ruta")) c.r++;
else if(s.includes("recibido")) c.re++;
else if(s.includes("cancelado")) c.cancel++;
else c.p++;
});

if(chart) chart.destroy();

chart=new Chart(chart,{
type:"doughnut",
data:{
labels:["Entregado","En Ruta","Pendiente","Recibido","Cancelado"],
datasets:[{data:[c.e,c.r,c.p,c.re,c.cancel]}]
}
});
}

/* ===== EVENTOS ===== */
buscador.oninput=render;
fEstado.onchange=render;

/* INIT */
render();

</script>

</body>
</html>

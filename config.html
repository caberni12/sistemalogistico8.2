<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Configuración de Columnas</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f1f5f9;
  padding:20px;
}

h2{
  margin-bottom:15px;
}

/* ===== BOTÓN ===== */
button{
  padding:10px 14px;
  border:0;
  border-radius:8px;
  background:#14b8a6;
  color:#fff;
  cursor:pointer;
  font-size:14px;
}

button:hover{
  opacity:.9;
}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.modal-content{
  background:#fff;
  padding:20px;
  border-radius:14px;
  width:90%;
  max-width:500px;
  max-height:85vh;
  overflow:auto;
  box-shadow:0 10px 40px rgba(0,0,0,.2);
}

/* ===== LISTA ===== */
#listaColumnas{
  display:flex;
  flex-direction:column;
  gap:6px;
  max-height:300px;
  overflow:auto;
  margin-bottom:12px;
}

#listaColumnas label{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 8px;
  border-radius:8px;
  background:#f1f5f9;
  font-size:13px;
}

#listaColumnas input{
  margin-right:6px;
}

/* ===== BOTON LOCK ===== */
.btnLock{
  border:0;
  background:none;
  cursor:pointer;
  font-size:14px;
}

/* ===== FOOTER BOTONES ===== */
.modal-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.modal-actions button{
  flex:1;
}

/* ===== SCROLL ===== */
#listaColumnas::-webkit-scrollbar{
  width:6px;
}
#listaColumnas::-webkit-scrollbar-thumb{
  background:#cbd5e1;
  border-radius:10px;
}

</style>
</head>

<body>

<h2>⚙️ Configuración</h2>

<!-- BOTÓN ABRIR -->
<button id="btnColumnas">🧩 Configurar Columnas</button>

<!-- MODAL -->
<div class="modal" id="modalColumnas">
  <div class="modal-content">

    <h3>Columnas y Botones</h3>

    <!-- CONTENIDO DINÁMICO -->
    <div id="listaColumnas"></div>

    <!-- ACCIONES -->
    <div class="modal-actions">
      <button id="btnGuardarColumnas">💾 Guardar</button>
      <button id="btnCerrarColumnas">❌ Cerrar</button>
    </div>

  </div>
</div>

<!-- JS -->
<script src="columnas2.js"></script>

</body>
</html>
